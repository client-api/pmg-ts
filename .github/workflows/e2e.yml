name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pmg:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # GHCR login for the proxmox-docker images. The action pulls the image
      # itself; this just authorises that pull on private/published repos.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Starts ghcr.io/client-api/proxmox-docker/pmg-test:9.0, waits for it
      # to become healthy, and exports PROXMOX_* + capability flags into
      # $GITHUB_ENV. PMG ships `PROXMOX_TOKEN_VALUE=(unsupported-by-pmg)`
      # so SC-12/SC-13 token scenarios skip themselves.
      - uses: client-api/proxmox-docker-action@v1
        with:
          product: pmg
          tag: '9.0'

      - run: pnpm test:e2e
        env:
          # The container ships a self-signed TLS cert; accept it for the
          # duration of the test job only. Production code must never set this.
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
